<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tap Elephant — улучшай слона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            transition: background 0.2s, color 0.2s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            padding: 20px 16px 70px;
            overflow-y: auto;
        }

        /* Навигация снизу */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 12px;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            transition: color 0.2s;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .nav-item.active {
            color: var(--tg-theme-button-color, #2dc6c6);
        }
        .nav-icon {
            font-size: 24px;
        }

        .tab-view {
            display: none;
            animation: fadeIn 0.2s ease;
        }
        .tab-view.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .stats-grid {
            display: flex;
            justify-content: space-around;
            gap: 12px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #2dc6c6);
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .tap-button {
            width: 180px;
            height: 180px;
            background: var(--tg-theme-button-color, #2dc6c6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            border: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
            transition: transform 0.05s linear, box-shadow 0.05s linear;
            cursor: pointer;
            margin: 20px auto;
            color: white;
        }
        .tap-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }

        .next-goal {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
        .progress-bar {
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #2dc6c6);
            width: 0%;
            transition: width 0.3s;
        }

        .bonus-block {
            margin-bottom: 24px;
        }
        .bonus-title {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .temp-bonus {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .temp-bonus-text {
            flex: 1;
        }
        .temp-bonus-name {
            font-weight: bold;
        }
        .temp-bonus-desc {
            font-size: 12px;
            opacity: 0.6;
        }
        .subscribe-btn {
            background: var(--tg-theme-button-color, #2dc6c6);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .subscribe-btn:active {
            opacity: 0.7;
        }
        .double-active {
            background: #2dc6c620;
            border-radius: 20px;
            padding: 8px 12px;
            font-size: 12px;
            text-align: center;
        }

        .upgrade-item {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .upgrade-info {
            flex: 1;
        }
        .upgrade-name {
            font-weight: bold;
        }
        .upgrade-desc {
            font-size: 12px;
            opacity: 0.6;
        }
        .upgrade-btn {
            background: var(--tg-theme-button-color, #2dc6c6);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
        }
        .upgrade-btn:active {
            opacity: 0.7;
        }
        .upgrade-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 56px;
            height: 56px;
            background: var(--tg-theme-button-color, #2dc6c6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .profile-name {
            font-weight: bold;
            font-size: 18px;
        }
        .achievement {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(45,198,198,0.1);
            border-radius: 16px;
        }

        .float-number {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #2dc6c6);
            animation: floatUp 0.6s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 4px white;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="main-content">
        <!-- Вкладка Тап -->
        <div id="tapTab" class="tab-view active">
            <div class="card">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="tapCount">0</div>
                        <div class="stat-label">Тапов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="multiplierDisplay">1</div>
                        <div class="stat-label">Множитель</div>
                    </div>
                </div>
                <button class="tap-button" id="tapBtn">🐘</button>
                <div id="nextGoal" class="next-goal">
                    До следующего порога: <span id="remainingToNext">1000</span>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <div id="doubleTimer" class="double-active" style="margin-top: 12px; display: none;"></div>
            </div>
        </div>

        <!-- Вкладка Улучшения -->
        <div id="boostsTab" class="tab-view">
            <div class="card">
                <div class="bonus-block">
                    <div class="bonus-title">⚡ Временный бонус</div>
                    <div class="temp-bonus">
                        <div class="temp-bonus-text">
                            <div class="temp-bonus-name">Удвоение тапов x2</div>
                            <div class="temp-bonus-desc">Активируется после подписки на канал</div>
                        </div>
                        <button id="subscribeBtn" class="subscribe-btn">Подписаться</button>
                    </div>
                </div>

                <div class="bonus-block">
                    <div class="bonus-title">📈 Постоянные улучшения</div>
                    <div id="upgradesList"></div>
                </div>
            </div>
        </div>

        <!-- Вкладка Профиль -->
        <div id="profileTab" class="tab-view">
            <div class="card">
                <div class="profile-row">
                    <div class="profile-avatar" id="profileAvatar">🐘</div>
                    <div class="profile-name" id="profileName">Загрузка...</div>
                </div>
                <div class="stat-item" style="text-align: left; margin-bottom: 16px;">
                    <div class="stat-value" id="profileTaps">0</div>
                    <div class="stat-label">Всего тапов</div>
                </div>
                <div id="achievementsList"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" data-tab="tap">
            <span class="nav-icon">🐘</span>
            <span>Тап</span>
        </button>
        <button class="nav-item" data-tab="boosts">
            <span class="nav-icon">⚡</span>
            <span>Улучшения</span>
        </button>
        <button class="nav-item" data-tab="profile">
            <span class="nav-icon">👤</span>
            <span>Профиль</span>
        </button>
    </div>

    <script>
        // Инициализация Telegram
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const user = tg.initDataUnsafe?.user;
        let userName = 'Гость';
        let userId = 'неизвестно';
        if (user) {
            userName = user.first_name || 'Пользователь';
            if (user.last_name) userName += ' ' + user.last_name;
            userId = user.id;
        }

        // Элементы DOM
        const tapCountEl = document.getElementById('tapCount');
        const multiplierDisplay = document.getElementById('multiplierDisplay');
        const tapBtn = document.getElementById('tapBtn');
        const remainingSpan = document.getElementById('remainingToNext');
        const progressFill = document.getElementById('progressFill');
        const doubleTimerDiv = document.getElementById('doubleTimer');
        const upgradesContainer = document.getElementById('upgradesList');
        const achievementsContainer = document.getElementById('achievementsList');
        const profileNameEl = document.getElementById('profileName');
        const profileAvatarEl = document.getElementById('profileAvatar');
        const profileTapsEl = document.getElementById('profileTaps');
        const subscribeBtn = document.getElementById('subscribeBtn');

        // Пороги и награды (базовый множитель)
        const thresholds = [
            { value: 1000, multiplierBonus: 1, name: '1 000 тапов', icon: '⚡' },
            { value: 100000, multiplierBonus: 1, name: '100 000 тапов', icon: '🤖' },
            { value: 1000000, multiplierBonus: 1, name: '1 000 000 тапов', icon: '🏆' },
            { value: 100000000, multiplierBonus: 1, name: '100 000 000 тапов', icon: '👑' }
        ];

        // Список улучшений (постоянные)
        const upgrades = [
            { id: 0, price: 100, bonus: 0.1, name: 'x1.1', desc: '+0.1 к множителю' },
            { id: 1, price: 500, bonus: 0.1, name: 'x1.2', desc: '+0.1 к множителю' },
            { id: 2, price: 1000, bonus: 0.1, name: 'x1.3', desc: '+0.1 к множителю' },
            { id: 3, price: 5000, bonus: 0.1, name: 'x1.4', desc: '+0.1 к множителю' },
            { id: 4, price: 25000, bonus: 0.1, name: 'x1.5', desc: '+0.1 к множителю' }
        ];

        // Состояние игры
        let state = {
            taps: 0,
            baseMultiplier: 1,          // от порогов (каждый порог даёт +1)
            purchasedUpgrades: [],      // индексы купленных улучшений
            doubleActive: false,
            doubleEndTime: 0
        };

        // Функции форматирования
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }

        // Получить общий множитель (базовый + бонусы от улучшений)
        function getTotalMultiplier() {
            let upgradeBonus = 0;
            for (let idx of state.purchasedUpgrades) {
                upgradeBonus += upgrades[idx].bonus;
            }
            let total = state.baseMultiplier + upgradeBonus;
            return Math.max(1, total);
        }

        // Сохранение / загрузка
        function saveProgress() {
            const toSave = {
                taps: state.taps,
                baseMultiplier: state.baseMultiplier,
                purchasedUpgrades: state.purchasedUpgrades,
                doubleActive: state.doubleActive,
                doubleEndTime: state.doubleEndTime
            };
            localStorage.setItem('tapElephant', JSON.stringify(toSave));
        }

        function loadProgress() {
            const saved = localStorage.getItem('tapElephant');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    state.taps = data.taps || 0;
                    state.baseMultiplier = data.baseMultiplier || 1;
                    state.purchasedUpgrades = data.purchasedUpgrades || [];
                    state.doubleActive = data.doubleActive || false;
                    state.doubleEndTime = data.doubleEndTime || 0;
                    if (state.doubleActive && Date.now() > state.doubleEndTime) {
                        state.doubleActive = false;
                    }
                } catch(e) { console.warn(e); }
            }
            updateUI();
        }

        // Проверка порогов (увеличиваем базовый множитель за каждый пройденный порог)
        function checkThresholds() {
            let newBase = 1;
            for (let th of thresholds) {
                if (state.taps >= th.value) {
                    newBase += th.multiplierBonus;
                } else {
                    break;
                }
            }
            if (newBase !== state.baseMultiplier) {
                state.baseMultiplier = newBase;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                showFloatingText(`Множитель увеличен до x${getTotalMultiplier()}!`, '#ffaa00', tapBtn);
            }
        }

        // Получение следующего порога
        function getNextThreshold() {
            for (let i = 0; i < thresholds.length; i++) {
                if (state.taps < thresholds[i].value) {
                    return thresholds[i];
                }
            }
            return null;
        }

        // Обновление UI (все вкладки)
        function updateUI() {
            const totalMult = getTotalMultiplier();
            tapCountEl.textContent = formatNumber(state.taps);
            multiplierDisplay.textContent = totalMult.toFixed(1);
            profileTapsEl.textContent = formatNumber(state.taps);

            const next = getNextThreshold();
            if (next) {
                const remaining = next.value - state.taps;
                remainingSpan.textContent = formatNumber(remaining);
                const percent = (state.taps / next.value) * 100;
                progressFill.style.width = Math.min(100, percent) + '%';
            } else {
                remainingSpan.textContent = '0';
                progressFill.style.width = '100%';
            }

            // Отображение таймера удвоения
            if (state.doubleActive) {
                const secondsLeft = Math.ceil((state.doubleEndTime - Date.now()) / 1000);
                doubleTimerDiv.style.display = 'block';
                doubleTimerDiv.textContent = `⚡ x2 активен! Осталось: ${secondsLeft} сек`;
                if (secondsLeft <= 0) {
                    state.doubleActive = false;
                    doubleTimerDiv.style.display = 'none';
                    updateUI();
                }
            } else {
                doubleTimerDiv.style.display = 'none';
            }

            // Обновляем главную кнопку
            tg.MainButton.setText(`Отправить (${formatNumber(state.taps)})`);

            // Рендерим улучшения и достижения
            renderUpgrades();
            renderAchievements();
        }

        // Рендер списка улучшений
        function renderUpgrades() {
            let html = '';
            for (let up of upgrades) {
                const alreadyBought = state.purchasedUpgrades.includes(up.id);
                let buttonHtml = '';
                if (alreadyBought) {
                    buttonHtml = `<button class="upgrade-btn disabled" disabled>Куплено</button>`;
                } else {
                    const canBuy = state.taps >= up.price;
                    buttonHtml = `<button class="upgrade-btn" data-id="${up.id}" ${!canBuy ? 'disabled' : ''}>${formatNumber(up.price)} тапов</button>`;
                }
                html += `
                    <div class="upgrade-item">
                        <div class="upgrade-info">
                            <div class="upgrade-name">${up.name}</div>
                            <div class="upgrade-desc">${up.desc}</div>
                        </div>
                        ${buttonHtml}
                    </div>
                `;
            }
            upgradesContainer.innerHTML = html;

            // Вешаем обработчики на кнопки покупки
            document.querySelectorAll('.upgrade-btn[data-id]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    buyUpgrade(id);
                });
            });
        }

        // Покупка улучшения
        function buyUpgrade(id) {
            const upgrade = upgrades.find(u => u.id === id);
            if (!upgrade) return;
            if (state.purchasedUpgrades.includes(id)) return;
            if (state.taps < upgrade.price) return;

            state.taps -= upgrade.price;
            state.purchasedUpgrades.push(id);
            saveProgress();
            updateUI();
            showFloatingText(`Куплено ${upgrade.name}!`, '#44ff44', tapBtn);
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }

        // Рендер достижений
        function renderAchievements() {
            let html = '<div style="margin-bottom: 12px; font-weight: bold;">Достижения</div>';
            for (let th of thresholds) {
                const achieved = state.taps >= th.value;
                const icon = achieved ? '✅' : '🔒';
                html += `
                    <div class="achievement">
                        <div class="achievement-icon">${icon}</div>
                        <div>${th.name} ${achieved ? '' : '(не пройден)'}</div>
                    </div>
                `;
            }
            achievementsContainer.innerHTML = html;
        }

        // Добавление тапов (с учётом временного удвоения)
        function addPoints(basePoints) {
            let points = basePoints;
            if (state.doubleActive) points *= 2;
            state.taps += points;
            checkThresholds();
            updateUI();
            saveProgress();
        }

        // Обработка тапа
        function onTap(e) {
            const mult = getTotalMultiplier();
            addPoints(mult);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            const rect = tapBtn.getBoundingClientRect();
            const x = rect.left + rect.width/2 - 20;
            const y = rect.top + rect.height/2 - 20;
            showFloatingText(`+${mult * (state.doubleActive ? 2 : 1)}`, null, null, x, y);
            tapBtn.style.transform = 'scale(0.95)';
            setTimeout(() => tapBtn.style.transform = '', 100);
        }

        // Всплывающий текст
        function showFloatingText(text, color, element, x, y) {
            const div = document.createElement('div');
            div.className = 'float-number';
            div.textContent = text;
            if (color) div.style.color = color;
            if (x !== undefined && y !== undefined) {
                div.style.left = x + 'px';
                div.style.top = y + 'px';
            } else if (element) {
                const rect = element.getBoundingClientRect();
                div.style.left = rect.left + rect.width/2 - 20 + 'px';
                div.style.top = rect.top + rect.height/2 - 20 + 'px';
            } else {
                div.style.left = '50%';
                div.style.top = '50%';
            }
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 600);
        }

        // Активация временного удвоения
        function activateDouble() {
            if (state.doubleActive) {
                // Если уже активен, можно продлить? По желанию: просто сбросим таймер
                state.doubleEndTime = Date.now() + 30000;
            } else {
                state.doubleActive = true;
                state.doubleEndTime = Date.now() + 30000;
            }
            saveProgress();
            updateUI();
            showFloatingText('x2 активирован на 30 секунд!', '#ffaa00', tapBtn);
            // Таймер автоотключения
            setTimeout(() => {
                if (state.doubleActive && Date.now() >= state.doubleEndTime) {
                    state.doubleActive = false;
                    updateUI();
                    showFloatingText('x2 закончился', '#ff6666', tapBtn);
                    saveProgress();
                }
            }, 30000);
        }

        // Подписка на канал
        subscribeBtn.addEventListener('click', () => {
            // Открываем ссылку на канал
            tg.openTelegramLink('https://t.me/newpeople_vologda');
            // Активируем бонус (можно добавить небольшую задержку, но пока сразу)
            activateDouble();
        });

        // Переключение вкладок
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(tab => tab.classList.remove('active'));
            document.getElementById(tabId + 'Tab').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'profile') {
                profileNameEl.textContent = userName;
                profileAvatarEl.textContent = userName.charAt(0).toUpperCase() || '🐘';
                renderAchievements();
            }
            if (tabId === 'boosts') renderUpgrades();
        }

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.getAttribute('data-tab');
                switchTab(tab);
            });
        });

        // Инициализация
        loadProgress();
        tapBtn.addEventListener('click', onTap);
        tg.MainButton.text = `Отправить (${formatNumber(state.taps)})`;
        tg.MainButton.show();
        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify({ taps: state.taps, multiplier: getTotalMultiplier(), user: userName }));
            tg.close();
        });
        tg.ready();

        window.addEventListener('beforeunload', () => saveProgress());
    </script>
</body>
</html>
