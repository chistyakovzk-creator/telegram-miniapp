<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tap Elephant — улучшай слона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            transition: background 0.2s, color 0.2s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-content {
            flex: 1;
            padding: 20px 16px 70px;
            overflow-y: auto;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-secondary-bg-color, #f8f8f8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            padding: 8px 16px 12px;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #999);
            transition: color 0.2s;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .nav-item.active {
            color: var(--tg-theme-button-color, #2dc6c6);
        }
        .nav-icon {
            font-size: 24px;
        }

        .tab-view {
            display: none;
            animation: fadeIn 0.2s ease;
        }
        .tab-view.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .stats-grid {
            display: flex;
            justify-content: space-around;
            gap: 12px;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #2dc6c6);
        }
        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .tap-button {
            width: 180px;
            height: 180px;
            background: var(--tg-theme-button-color, #2dc6c6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            border: none;
            box-shadow: 0 8px 0 rgba(0,0,0,0.15);
            transition: transform 0.05s linear, box-shadow 0.05s linear;
            cursor: pointer;
            margin: 20px auto;
            color: white;
        }
        .tap-button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }

        .next-goal {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
        }
        .progress-bar {
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #2dc6c6);
            width: 0%;
            transition: width 0.3s;
        }

        .bonus-block {
            margin-bottom: 24px;
        }
        .bonus-title {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
        }
        .temp-bonus {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .subscribe-btn {
            background: var(--tg-theme-button-color, #2dc6c6);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        .double-active {
            background: #2dc6c620;
            border-radius: 20px;
            padding: 8px 12px;
            font-size: 12px;
            text-align: center;
            margin-top: 12px;
        }

        .upgrade-item {
            background: var(--tg-theme-bg-color, white);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .upgrade-info {
            flex: 1;
        }
        .upgrade-name {
            font-weight: bold;
        }
        .upgrade-desc {
            font-size: 12px;
            opacity: 0.6;
        }
        .upgrade-btn {
            background: var(--tg-theme-button-color, #2dc6c6);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
        }
        .upgrade-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 56px;
            height: 56px;
            background: var(--tg-theme-button-color, #2dc6c6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .profile-name {
            font-weight: bold;
            font-size: 18px;
        }
        .achievement {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px;
            background: rgba(45,198,198,0.1);
            border-radius: 16px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .leaderboard-rank {
            font-weight: bold;
            width: 40px;
        }
        .leaderboard-name {
            flex: 1;
        }
        .leaderboard-taps {
            font-weight: bold;
            color: var(--tg-theme-button-color);
        }

        .float-number {
            position: fixed;
            pointer-events: none;
            font-size: 28px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #2dc6c6);
            animation: floatUp 0.6s ease-out forwards;
            z-index: 1000;
            text-shadow: 0 0 4px white;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-50px) scale(1.2); }
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="main-content">
        <!-- Вкладка Тап -->
        <div id="tapTab" class="tab-view active">
            <div class="card">
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="tapCount">0</div>
                        <div class="stat-label">Тапов</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="multiplierDisplay">1</div>
                        <div class="stat-label">Множитель</div>
                    </div>
                </div>
                <button class="tap-button" id="tapBtn">🐘</button>
                <div id="nextGoal" class="next-goal">
                    До следующего порога: <span id="remainingToNext">1000</span>
                    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                </div>
                <div id="doubleTimer" class="double-active" style="display: none;"></div>
            </div>
        </div>

        <!-- Вкладка Улучшения -->
        <div id="boostsTab" class="tab-view">
            <div class="card">
                <div class="bonus-block">
                    <div class="bonus-title">⚡ Временный бонус</div>
                    <div class="temp-bonus">
                        <div>Удвоение тапов x2 на 30 сек за подписку</div>
                        <button id="subscribeBtn" class="subscribe-btn">Подписаться</button>
                    </div>
                </div>
                <div class="bonus-block">
                    <div class="bonus-title">📈 Постоянные улучшения</div>
                    <div id="upgradesList"></div>
                </div>
            </div>
        </div>

        <!-- Вкладка Лидеры -->
        <div id="leaderboardTab" class="tab-view">
            <div class="card">
                <div class="bonus-title">🏆 Топ-15 игроков</div>
                <div id="leaderboardList" style="margin-top: 12px;">Загрузка...</div>
            </div>
        </div>

        <!-- Вкладка Профиль -->
        <div id="profileTab" class="tab-view">
            <div class="card">
                <div class="profile-row">
                    <div class="profile-avatar" id="profileAvatar">🐘</div>
                    <div class="profile-name" id="profileName">Загрузка...</div>
                </div>
                <div class="stat-item" style="text-align: left; margin-bottom: 16px;">
                    <div class="stat-value" id="profileTaps">0</div>
                    <div class="stat-label">Всего тапов</div>
                </div>
                <div class="stat-item" style="text-align: left; margin-bottom: 16px;">
                    <div class="stat-value" id="recordTaps">0</div>
                    <div class="stat-label">Личный рекорд</div>
                </div>
                <div id="achievementsList"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" data-tab="tap"><span class="nav-icon">🐘</span><span>Тап</span></button>
        <button class="nav-item" data-tab="boosts"><span class="nav-icon">⚡</span><span>Улучшения</span></button>
        <button class="nav-item" data-tab="leaderboard"><span class="nav-icon">🏆</span><span>Лидеры</span></button>
        <button class="nav-item" data-tab="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
    </div>

    <script>
        // ========== НАСТРОЙКИ ==========
        const BACKEND_URL = 'https://chistywj.beget.tech/leaderboard.php';

        // ========== Telegram WebApp ==========
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        const user = tg.initDataUnsafe?.user;
        let userName = 'Гость';
        let userId = 'неизвестно';
        if (user) {
            userName = user.first_name || 'Пользователь';
            if (user.last_name) userName += ' ' + user.last_name;
            userId = user.id;
        }

        // ========== Игровое состояние ==========
        let state = {
            taps: 0,
            baseMultiplier: 1,
            purchasedUpgrades: [],
            doubleActive: false,
            doubleEndTime: 0
        };

        let personalRecord = 0;

        const thresholds = [
            { value: 1000, multiplierBonus: 1, name: '1 000 тапов' },
            { value: 100000, multiplierBonus: 1, name: '100 000 тапов' },
            { value: 1000000, multiplierBonus: 1, name: '1 000 000 тапов' },
            { value: 100000000, multiplierBonus: 1, name: '100 000 000 тапов' }
        ];

        const upgrades = [
            { id: 0, price: 100, bonus: 0.1, name: 'x1.1' },
            { id: 1, price: 500, bonus: 0.1, name: 'x1.2' },
            { id: 2, price: 1000, bonus: 0.1, name: 'x1.3' },
            { id: 3, price: 5000, bonus: 0.1, name: 'x1.4' },
            { id: 4, price: 25000, bonus: 0.1, name: 'x1.5' }
        ];

        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }

        function getTotalMultiplier() {
            let upgradeBonus = 0;
            for (let id of state.purchasedUpgrades) {
                upgradeBonus += upgrades.find(u => u.id === id).bonus;
            }
            return state.baseMultiplier + upgradeBonus;
        }

        function saveProgress() {
            localStorage.setItem('tapElephant', JSON.stringify({
                taps: state.taps,
                baseMultiplier: state.baseMultiplier,
                purchasedUpgrades: state.purchasedUpgrades,
                doubleActive: state.doubleActive,
                doubleEndTime: state.doubleEndTime,
                personalRecord: personalRecord
            }));
        }

        function loadProgress() {
            const saved = localStorage.getItem('tapElephant');
            if (saved) {
                const data = JSON.parse(saved);
                state.taps = data.taps || 0;
                state.baseMultiplier = data.baseMultiplier || 1;
                state.purchasedUpgrades = data.purchasedUpgrades || [];
                state.doubleActive = data.doubleActive || false;
                state.doubleEndTime = data.doubleEndTime || 0;
                personalRecord = data.personalRecord || 0;
                if (state.doubleActive && Date.now() > state.doubleEndTime) state.doubleActive = false;
            }
            updateUI();
        }

        function checkThresholds() {
            let newBase = 1;
            for (let th of thresholds) {
                if (state.taps >= th.value) newBase += th.multiplierBonus;
                else break;
            }
            if (newBase !== state.baseMultiplier) {
                state.baseMultiplier = newBase;
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                showFloatingText(`Множитель увеличен до x${getTotalMultiplier().toFixed(1)}!`, '#ffaa00');
            }
        }

        function getNextThreshold() {
            for (let th of thresholds) if (state.taps < th.value) return th;
            return null;
        }

        function updateUI() {
            const totalMult = getTotalMultiplier();
            document.getElementById('tapCount').textContent = formatNumber(state.taps);
            document.getElementById('multiplierDisplay').textContent = totalMult.toFixed(1);
            document.getElementById('profileTaps').textContent = formatNumber(state.taps);
            document.getElementById('recordTaps').textContent = formatNumber(personalRecord);
            document.getElementById('profileName').textContent = userName;
            document.getElementById('profileAvatar').textContent = userName.charAt(0).toUpperCase() || '🐘';

            const next = getNextThreshold();
            if (next) {
                const remaining = next.value - state.taps;
                document.getElementById('remainingToNext').textContent = formatNumber(remaining);
                const percent = (state.taps / next.value) * 100;
                document.getElementById('progressFill').style.width = Math.min(100, percent) + '%';
            } else {
                document.getElementById('remainingToNext').textContent = '0';
                document.getElementById('progressFill').style.width = '100%';
            }

            const doubleDiv = document.getElementById('doubleTimer');
            if (state.doubleActive) {
                const secondsLeft = Math.ceil((state.doubleEndTime - Date.now()) / 1000);
                doubleDiv.style.display = 'block';
                doubleDiv.textContent = `⚡ x2 активен! Осталось: ${secondsLeft} сек`;
                if (secondsLeft <= 0) {
                    state.doubleActive = false;
                    doubleDiv.style.display = 'none';
                }
            } else {
                doubleDiv.style.display = 'none';
            }

            tg.MainButton.setText(`Отправить (${formatNumber(state.taps)})`);
            renderUpgrades();
            renderAchievements();
        }

        function renderUpgrades() {
            const container = document.getElementById('upgradesList');
            let html = '';
            for (let up of upgrades) {
                const bought = state.purchasedUpgrades.includes(up.id);
                const canBuy = !bought && state.taps >= up.price;
                html += `
                    <div class="upgrade-item">
                        <div class="upgrade-info">
                            <div class="upgrade-name">${up.name}</div>
                            <div class="upgrade-desc">+0.1 к множителю</div>
                        </div>
                        ${bought ? '<button class="upgrade-btn disabled" disabled>Куплено</button>' :
                                  `<button class="upgrade-btn" data-id="${up.id}" ${!canBuy ? 'disabled' : ''}>${formatNumber(up.price)} тапов</button>`}
                    </div>
                `;
            }
            container.innerHTML = html;
            document.querySelectorAll('.upgrade-btn[data-id]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    const upgrade = upgrades.find(u => u.id === id);
                    if (!upgrade || state.purchasedUpgrades.includes(id) || state.taps < upgrade.price) return;
                    state.taps -= upgrade.price;
                    state.purchasedUpgrades.push(id);
                    saveProgress();
                    updateUI();
                    showFloatingText(`Куплено ${upgrade.name}!`, '#44ff44');
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                });
            });
        }

        function renderAchievements() {
            const container = document.getElementById('achievementsList');
            let html = '<div style="margin-bottom:12px;font-weight:bold;">Достижения</div>';
            for (let th of thresholds) {
                const achieved = state.taps >= th.value;
                html += `<div class="achievement"><div class="achievement-icon">${achieved ? '✅' : '🔒'}</div><div>${th.name}</div></div>`;
            }
            container.innerHTML = html;
        }

        function addPoints(points) {
            let actual = points;
            if (state.doubleActive) actual *= 2;
            state.taps += actual;
            if (state.taps > personalRecord) {
                personalRecord = state.taps;
                showFloatingText(`🏆 Новый рекорд! ${formatNumber(personalRecord)}`, '#ffaa00');
            }
            checkThresholds();
            updateUI();
            saveProgress();
        }

        function showFloatingText(text, color, element = tapBtn) {
            const div = document.createElement('div');
            div.className = 'float-number';
            div.textContent = text;
            if (color) div.style.color = color;
            const rect = element.getBoundingClientRect();
            div.style.left = rect.left + rect.width/2 - 20 + 'px';
            div.style.top = rect.top + rect.height/2 - 20 + 'px';
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 600);
        }

        function onTap() {
            const mult = getTotalMultiplier();
            addPoints(mult);
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            showFloatingText(`+${mult * (state.doubleActive ? 2 : 1)}`);
            tapBtn.style.transform = 'scale(0.95)';
            setTimeout(() => tapBtn.style.transform = '', 100);
        }

        function activateDouble() {
            if (state.doubleActive) {
                state.doubleEndTime = Date.now() + 30000;
            } else {
                state.doubleActive = true;
                state.doubleEndTime = Date.now() + 30000;
            }
            saveProgress();
            updateUI();
            showFloatingText('x2 активирован на 30 секунд!', '#ffaa00');
            setTimeout(() => {
                if (state.doubleActive && Date.now() >= state.doubleEndTime) {
                    state.doubleActive = false;
                    updateUI();
                    showFloatingText('x2 закончился', '#ff6666');
                    saveProgress();
                }
            }, 30000);
        }

        // ========== Бэкенд (лидерборд) ==========
        async function sendToBackend() {
            if (!BACKEND_URL) return;
            const data = {
                user_id: userId,
                user_name: userName,
                taps: state.taps
            };
            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!response.ok) {
                    const txt = await response.text().catch(() => '');
                    throw new Error(`HTTP ${response.status}${txt ? `: ${txt.slice(0, 80)}` : ''}`);
                }
                console.log('Score saved to leaderboard');
            } catch (err) {
                console.warn('Leaderboard error:', err);
            }
        }

        async function loadLeaderboard() {
            if (!BACKEND_URL) return;
            const container = document.getElementById('leaderboardList');
            container.innerHTML = '<div class="leaderboard-item">Загрузка...</div>';
            try {
                // 1) Основной вариант: GET ?limit=15
                let rows = [];
                let response = await fetch(`${BACKEND_URL}?limit=15`);
                if (response.ok) {
                    const data = await response.json();
                    if (Array.isArray(data)) rows = data;
                    else if (Array.isArray(data.rows)) rows = data.rows;
                    else if (Array.isArray(data.top)) rows = data.top;
                } else {
                    // 2) Fallback для некоторых PHP-реализаций: POST с action
                    const alt = await fetch(BACKEND_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'leaderboard', limit: 15 })
                    });
                    if (!alt.ok) {
                        const t = await alt.text().catch(() => '');
                        throw new Error(`HTTP ${alt.status}${t ? `: ${t.slice(0, 80)}` : ''}`);
                    }
                    const altData = await alt.json();
                    if (Array.isArray(altData)) rows = altData;
                    else if (Array.isArray(altData.rows)) rows = altData.rows;
                    else if (Array.isArray(altData.top)) rows = altData.top;
                }

                if (!rows.length) {
                    container.innerHTML = '<div class="leaderboard-item">Пока нет данных</div>';
                    return;
                }
                let html = '';
                rows.forEach((row, idx) => {
                    html += `<div class="leaderboard-item">
                                <div class="leaderboard-rank">${idx+1}</div>
                                <div class="leaderboard-name">${escapeHtml(row.user_name || row.name || 'Игрок')}</div>
                                <div class="leaderboard-taps">${formatNumber(row.taps || row.score || 0)}</div>
                             </div>`;
                });
                container.innerHTML = html;
            } catch (err) {
                console.warn('Leaderboard load error:', err);
                container.innerHTML = `<div class="leaderboard-item">Ошибка загрузки: ${escapeHtml(String(err.message || err))}</div>`;
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
        }

        function sendResult() {
            sendToBackend();
            tg.sendData(JSON.stringify({ taps: state.taps, multiplier: getTotalMultiplier(), user: userName }));
            tg.close();
        }

        // ========== Навигация ==========
        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId + 'Tab').classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            document.querySelector(`.nav-item[data-tab="${tabId}"]`).classList.add('active');
            if (tabId === 'leaderboard') loadLeaderboard();
            if (tabId === 'profile') renderAchievements();
            if (tabId === 'boosts') renderUpgrades();
        }

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
        });

        // ========== Инициализация ==========
        const tapBtn = document.getElementById('tapBtn');
        document.getElementById('subscribeBtn').addEventListener('click', () => {
            tg.openTelegramLink('https://t.me/newpeople_vologda');
            activateDouble();
        });

        loadProgress();
        tapBtn.addEventListener('click', onTap);
        tg.MainButton.text = `Отправить (${formatNumber(state.taps)})`;
        tg.MainButton.show();
        tg.MainButton.onClick(sendResult);
        tg.ready();

        window.addEventListener('beforeunload', () => saveProgress());
    </script>
</body>
</html>
